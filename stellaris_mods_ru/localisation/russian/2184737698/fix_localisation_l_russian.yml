  edict_edict_mod_options: "§BAI Game Performance Optimisation§!"
  edict_edict_mod_options_desc: "Показывает меню, где игрок сможет включать/отключать параметры оптимизации игры."

  micro_marketing: "Исправление микрозакупок для ИИ"
  micro_marketing_desc: "ИИ прекращает часто закупать маленькие партии ресурсов на галактическом рынке."

  planet_pop_conversion_count: "Локальная Политика Рождаемости"
  planet_pop_conversion_count_desc: "Локальный регулятор контроля рождаемости внутри колонии, направленный на предовращение бедствия галактических масштабов."

  country_pop_conversion_count: "Глобальная Политика Рождаемости"
  country_pop_conversion_count_desc: "Глобальный регулятор контроля рождаемости внутри государства, направленный на предовращение кризиса галактических масштабов."

