l_russian:

  fix_ai_actions.1.name: "AI Game Performance\nOptimisation"
  fix_ai_actions.1.desc: "С помощью этого меню можно управлять оптимизациями, которые будут применены к ИИ. Большинство из них включено по-умолчанию (и рекомендуется их не отключать), но если вы хотите их отключить нажмите на 'X', чтобы кнопка из §Tсерой§! стала §Rкрасной§!. Так вы отключите оптимизацию для ИИ. Для достижения максимальной производительности активируйте кнопки '§YОпт. для игроков§!' и '§RВыход§!'.\nПримечание: опция '§YОпт. для игроков§!' отключена по-умолчанию. Эти настройки можно будет изменить позже через соответствующий указ."

  fix_menu_events.2.name: "Отключить гиперретрансляторы для ИИ"
  fix_menu_events.2.desc: "Ограничить способность ИИ строить гиперретрансляторы, так как они сильно бьёт по производительности, особенно когда ИИ начинает строить их через всю свою империю.\n\nЭта функция должна повысить производительность на поздних стадиях игры в случае если кнопка неактивна (подсвечена §Tсерым§!)."

  fix_menu_events.3.name: "Ограничить гиперврата для ИИ"
  fix_menu_events.3.desc: "Ограничить способность ИИ строить гиперврата до двух штук раз в 100 лет (по-умолчанию), чтобы не дать ему возможности строить их «по поводу и без» где попало.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!). Оптимизацию можно настроить при помощи следующих параметров:"

  fix_menu_events.3.b: "§RОтключить гиперврата для ИИ§!"
  fix_menu_events.3.c: "§Y2§! гиперврат каждые §Y50§! лет"
  fix_menu_events.3.d: "§Y2§! гиперврат каждые §Y100§! лет (§Gпо-умолчанию§!)"
  fix_menu_events.3.e: "§Y2§! гиперврат каждые §Y150§! лет"

  fix_menu_events.4.name: "Ограничить среды обитания для ИИ"
  fix_menu_events.4.desc: "Ограничить способность ИИ строить среды обитания свыше 7 единиц (по-умолчанию).\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!). Оптимизацию можно настроить при помощи следующих параметров:"

  fix_menu_events.4.b: "§RОтключить среды обитания для ИИ§!"
  fix_menu_events.4.c: "§Y3§! среды обитания максимум"
  fix_menu_events.4.d: "§Y7§! сред обитания максимум (§Gпо-умолчанию§!)"
  fix_menu_events.4.e: "§Y11§! сред обитания максимум"
  
  fix_menu_events.5.name: "Ограничить миры-кольца для ИИ"
  fix_menu_events.5.desc: "Ограничить способность ИИ строить миры-кольца свыше 3 экземпляров (по-умолчанию).\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!). Оптимизацию можно настроить при помощи следующих параметров:"

  fix_menu_events.5.b: "§RОтключить миры-кольца для ИИ§!"
  fix_menu_events.5.c: "§Y1§! мир-кольцо максимум"
  fix_menu_events.5.d: "§Y3§! мира-кольца максимум (§Gпо-умолчанию§!)"
  fix_menu_events.5.e: "§Y5§! миров-колец максимум"

  fix_menu_events.6.name: "Ограничить колонизацию для ИИ"
  fix_menu_events.6.desc: "Запрещает колонизацию новых планет для ИИ, устанавливая ограничение в §Y60§! планет для каждого ИИ (по умолчанию).\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!). Оптимизацию можно настроить при помощи следующих параметров:"

  fix_menu_events.6.b: "§Y10§! планет максимум"
  fix_menu_events.6.c: "§Y30§! планет максимум"
  fix_menu_events.6.d: "§Y60§! планет максимум (§Gпо-умолчанию§!)"

  fix_menu_events.7.name: "Помогает ИИ с безработицей"
  fix_menu_events.7.desc: "Ускоряет заполнение ИИ вакансий на своих колониях и снижает безработицу за счет переселения безработных граждан в колонии с открытыми вакансиями.\n\nЭта функция должна повысить производительность, если кнопка неактивна (подсвечена §Tсерым§!) §R(менее значимо в версии 4.0)§!."

  fix_menu_events.8.name: "Запретить Омникодекс для ИИ"
  fix_menu_events.8.desc: "Не позволяет ИИ получить и использовать реликвию Омникодекс, чтобы предотвратить появление ненужных гибридных видов.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!). Оптимизацию можно настроить при помощи следующих параметров:"

  fix_menu_events.8.b: "§RПолностью удаляет реликвию§! (§Gпо-умолчанию§!)"
  fix_menu_events.8.c: "Передаёт обнаруженную реликвию §Yигроку§!"

  fix_menu_events.9.name: "Отключить ксеносовместимость для ИИ"
  fix_menu_events.9.desc: "Предотвращает получение ИИ бонуса вознесения «Ксеносовместимость», чтобы избежать появления ненужных гибридных видов.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!)."

  fix_menu_events.10.name: "Оптимизировать флотилии для ИИ"
  fix_menu_events.10.desc: "Ограничить способность ИИ собирать корветы/фрегаты/эсминцы и крейсера путем ограничения количества корветов и фрегатов до 60 экземпляров, эсминцев до 30 экземпляров и крейсеров до 15 экземпляров в составе одной флотилии (по умолчанию). Как только ИИ достигает этого лимита, корвет заменяется на фрегат, 2 фрегата на эсминец, 2 эсминца на крейсер и, наконец, 2 крейсера на линейный корабль. Это должно привести к тому, что флотилии, управляемые ИИ, станут менее многочисленными и более сбалансированными(обмен «два к одному» более чем оправдан экономически). Это также относится и к биокораблям и происходит только в тот момент, когда это становится возможным, при наличии соответствующих технологий для соблюдения игрового баланса.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!). Оптимизацию можно настроить при помощи следующих параметров:"

  fix_menu_events.10.b: "Максимум §Y15§! корветов/фрегатов, §Y8§! эсминцев и §Y4§! крейсера"
  fix_menu_events.10.c: "Максимум §Y30§! корветов/фрегатов, §Y15§! эсминцев и §Y8§! крейсеров"
  fix_menu_events.10.d: "Максимум §Y60§! корветов/фрегатов, §Y30§! эсминцев и §Y15§! крейсеров (§Gпо-умолчанию§!)"
  fix_menu_events.10.e: "Максимум §Y120§! корветов/фрегатов, §Y60§! эсминцев и §Y30§! крейсеров"
  fix_menu_events.10.f: "Максимум §Y240§! корветов/фрегатов, §Y120§! эсминцев и §Y60§! крейсеров"
  fix_menu_events.10.g: "Максимум §Y480§! корветов/фрегатов, §Y240§! эсминцев и §Y120§! крейсеров"
  fix_menu_events.10.h: "Максимум §Y960§! корветов/фрегатов, §Y480§! эсминцев и §Y240§! крейсеров"
  fix_menu_events.10.i: "Максимум §Y1920§! корветов/фрегатов, §Y960§! эсминцев и §Y480§! крейсеров"

  fix_menu_events.11.name: "Ограничить вечную бдительность для ИИ"
  fix_menu_events.11.desc: "Не позволяет ИИ выбирать полные и половинчатые варианты политик расходования средств, полученные благодаря бонусу вознесения «Вечная Бдительность».\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!)."

  fix_menu_events.12.name: "Отключить для ИИ Цитадели Глубокого Космоса"
  fix_menu_events.12.desc: "Запрещает ИИ строить Цитадели Дальнего Космоса, поскольку он часто возводит их в чрезмерно больших количествах.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!)."

  fix_menu_events.13.name: "Оптимизировать количество флотилии ИИ"
  fix_menu_events.13.desc: "Предотвращает наличие у ИИ нескольких частично укомплектованных флотилий и объединяет их, когда представляется такая возможность, к примеру в мирное время.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!)."

  fix_menu_events.14.name: "Оптимизация Обновления Модификаторов"
  fix_menu_events.14.desc: "Снижает задержку из-за частого обновление модификаторов, уменьшая частоту их обновления до §Y3 раз в месяц§!.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!)."

  fix_menu_events.15.name: "Оптимизация вскоре будет доступна..."
  fix_menu_events.15.desc: "Оптимизация вскоре будет доступна..."

  fix_menu_events.16.name: "§YВключить некоторые оптимизации ИИ для игроков§!"
  fix_menu_events.16.desc: "Если пожелаете, некоторые из оптимизаций ИИ будут также применены и к игрокам для выравнивания баланса и улучшения общей производительности игры. На данный момент они включают следующее (если оптимизации не отключены): 'Ограничение Вечной Бдительности'.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!)."

  # fix_menu_events.12.name: "Ограничения роста населения ИИ"
  # fix_menu_events.12.desc: "Ограничивает рост населения у ИИ/Игрока, добавляя на каждую из колоний отдельный модификатор роста, который зависит от численности населения колонии. Подобное исправление заметно снижает прирост населения и скорость его сборки, взамен предоставляя бонусы к производству ресурсов населением (и другие вещи), а так-же дипломатическому весу от поселений.\n\nЭта функция должна повысить производительность на поздних стадиях игры, если кнопка неактивна (подсвечена §Tсерым§!). Оптимизацию можно настроить при помощи следующих параметров:"

  # fix_menu_events.12.b: "Установить ограничение на §Y50%§! эффективности"
  # fix_menu_events.12.c: "Установить ограничение на §Y100%§! эффективности (§Gпо-умолчанию§!)"
  # fix_menu_events.12.d: "Установить ограничение на §Y150%§! эффективности"

