l_russian:

 # Vanilla Uninhabitable planets
 pc_gas_giant: "Газовый Мир"
 pc_gas_giant_desc: "Газовые миры — это гигантские планеты, состоящие преимущественно из газа, в частности из водорода и гелия."
 pc_asteroid: "Астероид"
 pc_asteroid_desc: "Более крупный астероид или планетоид, выделяющийся своим размером в плотном скоплении более мелких подобных тел."
 pc_molten: "Расплавленный Мир"
 pc_molten_desc: "Расплавленные миры — это раскаленные каменные планеты, на поверхности которых свободно течет магма. Они могут иметь как тонкую, так и плотную атмосферу, наполненную первичными газами."
 pc_barren_cold: "Безатмосферный Мир"
 pc_barren_cold_desc: "Миры без атмосферы — это каменные планеты с поверхностью, испещрённой кратерами; эти особенности сохранились, поскольку на них отсутствует какая-либо геологическая активность и значимая атмосфера, а значит, отсутствует и любая форма эрозии."
 pc_barren: "Бесплодный Мир"
 pc_barren_desc: "Бесплодные миры — это каменные планеты, состоящие преимущественно из силикатных пород или металлов. Эти миры, как правило, геологически активны, имеют разреженную атмосферу и внутреннюю структуру, состоящую из металлического ядра и окружающей его силикатной мантии."
 pc_frozen: "Океанический Мир"
 pc_frozen_desc: "Океанические миры — это каменные планеты, поверхность которых полностью погружена в талассогенный океан, который может быть либо жидким, либо покрытым слоем льда различной толщины в зависимости от температуры и других условий." 
 pc_toxic:0 "Токсичный Мир"
 pc_toxic_desc: "Токсичные миры — это каменистые планеты, состоящие преимущественно из силикатных пород или металлов. Эти миры геологически активны и обладают плотной атмосферой, наполненной парниковыми и токсичными газами. Как правило, условия на поверхности слишком неблагоприятны для развития сложных форм жизни, но в некоторых случаях на их поверхности могут встречаться простейшие формы."
 
 # Climates
 climate_dry: "Сухой"
 climate_cold: "Холодный"
 climate_wet: "Влажный"
 dry: "§Y(Жаркий климат и засушливые экосистемы, удаленные от источников воды)§!"
 cold: "§E(Холодный климат и суровые экосистемы удаленные от геотермальных источников)§!"
 wet: "§G(Умеренный климат и влажные экосистемы со сбалансированной гидросферой)§!"
 
 # Vanilla Habitable planets
 pc_desert: "Термо-пелагический Мир"
 pc_desert_desc: "\nМиры пелагического типа имеют единый всемирный океан, усеянный массивами суши разного размера — от небольших архипелагов до огромных, размером с целый континент. Жизнь, процветающая на засушливых мирах термо-пелагического типа,  приспособлена к жаркому климату с повышенной концентрацией парниковых газов и водоёмам с преимущественно кислой средой."
 pc_desert_adj: "термо-пелагический"
 trait_pc_desert_preference: "Предпочтение Термо-Пелагических миров"
 mod_pc_desert_habitability: "Приспособленность к Термо-Пелагическим мирам"
 
 pc_savannah: "Термо-теллурический Мир"
 pc_savannah_desc: "\nТеллурические миры состоят из нескольких континентальных массивов, разделенных океанами. Жизнь, процветающая на засушливых мирах термо-теллурического типа,приспособлена к жаркому климату с повышенной концентрацией парниковых газов и водоёмам с преимущественно кислой средой."
 pc_savannah_adj: "термо-теллурический"
 trait_pc_savannah_preference: "Предпочтение Термо-Теллурических миров"
 mod_pc_savannah_habitability: "Приспособленность к Термо-Теллурическим мирам"
 
 pc_arid: "Термо-талассианский Мир"
 pc_arid_desc: "\nВ талассианских мирах нет океанов, разделяющих их материковые массивы, но при этом в них присутствует активная гидросфера, включающая многочисленные внутренние моря различного размера. Жизнь, процветающая на засушливых мирах термо-талассианского типа, приспособлена к жаркому климату с повышенной концентрацией парниковых газов и водоёмам с преимущественно кислой средой."
 pc_arid_adj: "термо-талассианский"
 trait_pc_arid_preference: "Предпочтение Термо-Талассианских миров"
 mod_pc_arid_habitability: "Приспособленность к Термо-Талассианским мирам"
 
 pc_ocean: "Пелагический Мир"
 pc_ocean_desc: "\nМиры пелагического типа имеют единый всемирный океан, усеянный массивами суши разного размера — от небольших архипелагов до огромных, размером с целый континент. Жизнь, процветающая на влажных мирах пелагического типа, приспособлена к умеренному климату с некоторыми сезонными колебаниями, что, как правило, способствует повышению биологического разнообразия."
