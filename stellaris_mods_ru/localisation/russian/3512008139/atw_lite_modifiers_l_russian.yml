 # For reference: Color codes
 #B 	Blue (Marine/Oceanic)
 #E 	Teal (Geothermal/cold)
 #G 	Green (Humid/wet)
 #H 	Orange (Marginal)
 #L 	Brown (Barren/Airless)
 #M 	Purple (Gaia)
 #P 	Light red (Molten)
 #R 	Red (Tomb)
 #S 	Dark orange (Gaseous)
 #T 	Light grey
 #W 	White
 #Y 	Yellow (Arid/hot)
 #! 	Default

 ## Planet Trait Modifiers

 # Environment
 environment-gaseous: "Газообразная Среда"
 environment-gaseous_desc: "Эта планета не имеет твёрдой поверхности и окутана плотной атмосферой из непрерывно перемешивающихся газов."
 environment-submerged: "Затопленная Среда"
 environment-submerged_desc: "Эта планета полностью покрыта талассогенным океаном. В зависимости от локальных температур и показателей давления её поверхность остаётся жидкой либо скованой льдом."
 environment-lifeless: "Безжизненная Среда"
 environment-lifeless_desc: "Эта планета бесплодна и полностью лишена каких-либо форм жизни."
 environment-barren: "Пустынная Среда"
 environment-barren_desc: "Хоть внеше эта планета довольно сурова и выглядит непригодной для жизни, под её поверхностью процветают многочисленные сообщества микроорганизмов."
 environment-frozen: "Замёрзшая Среда"
 environment-frozen_desc: "Поверхность этой планеты покрыта толстым слоем вечного льда."
 environment-glacial: "Ледниковая Среда"
 environment-glacial_desc: "Биосфера этой планеты крайне бедна. Большая часть её поверхности покрыта льдом и ледниками, тогда как под ледяным панцирем существует слабая морская экосистема."
 environment-negligible: "Слаборазвитая Среда"
 environment-negligible_desc: "Эта планета обладает крайне бедной биосферой. Почти вся её поверхность безжизненна, а немногочисленные экосистемы сосредоточены лишь возле редких источников жидкой воды."
 environment-exotic: "Экзотическая Среда"
 environment-exotic_desc: "Биосфера этой планеты развивалась на основе необычной биохимии, используя в качестве растворителей вещества, отличные от воды."
 environment-primordial: "Первобытная Среда"
 environment-primordial_desc: "Экосистема этой планеты находится на ранней стадии развития, а простейшие формы флоры и фауны постепенно приспосабливаются к окружающей среде."
 environment-subterranean: "Подземная Среда"
 environment-subterranean_desc: "Под поверхностью планеты простирается сеть гигантских пещер, пригодных для жизни благодаря близости грунтовых вод, естественным световым колодцам или искусственному освещению."
 environment-ammonia: "Аммиачная Среда"
 environment-ammonia_desc: "Эта планета лишена континентов, и вся жизнь сосредоточена в богатом аммиаком океане. Разнообразие организмов определяется различными слоями океанских глубин."
 environment-evolved: "Развитая Биоразнообразная Среда"
 environment-evolved_desc: "Эта планета обладает зрелой экосистемой с богатым разнообразием живых организмов, хорошо приспособленными к окружающей среде."
 environment-retinal: "Ретинальная Биоразнообразная Среда"
 environment-retinal_desc: "Эта планета обладает зрелой экосистемой с богатым разнообразием живых организмов и растительностью на основе ретиналя."
 environment-mycelial: "Мицелиальная Биоразнообразная Среда"
 environment-mycelial_desc: "Экосистема этой планеты находится в процессе развития, а среди растительности преобладают мицелиальные формы жизни."
 environment-bioluminescent: "Биолюминесцентная Среда"
 environment-bioluminescent_desc: "Эта планета обладает зрелой экосистемой, в которой доминируют биолюминесцентные организмы, приспособившиеся к условиям слабой освещённости."
 environment-marine: "Морская Биоразнообразная Среда"
 environment-marine_desc: "Эта планета лишена суши, и вся жизнь сосредоточена в океане. Разнообразие организмов определяется различными слоями океанских глубин."
 environment-dense: "Насыщенная Биоразнообразная Среда"
 environment-dense_desc: "Большая часть планеты покрыта густыми древесными экосистемами, изобилующими всевозможными формами жизни."
 environment-engineered: "Искусственно Сформированная Среда"
 environment-engineered_desc: "Биосфера этой планеты не является естественной. Местная флора и фауна возникла в иных условиях, после чего была тщательно отобрана и адаптирована для выживания в этом мире."
 environment-seeded: "Засеянная Биоразнообразная Среда"
 environment-seeded_desc: "Биосфера этой планеты была искусственно сформирована таким образом, чтобы создать комфортную и стабильную среду с идеально сбалансированным жизненным циклом."

 # Atmosphere - Uninhabitable
 atmosphere-tenuous_grey: "Разреженная Атмосфера"
 atmosphere-tenuous_grey_desc: "Эта планета практически лишена атмосферы либо обладает крайне разреженной газовой оболочкой в серых тонах, её характерный цвет определяется такими элементами как натрий и калий, которые в ней присутствуют, правда в довольно малых объёмах."
 atmosphere-tenuous_blue: "Разреженная Атмосфера"
 atmosphere-tenuous_blue_desc: "Эта планета практически лишена атмосферы либо обладает крайне разреженной газовой оболочкой в синих тонах, её характерный цвет определяется такими элементами как кислород и водяной лёд, которые в ней присутствуют, правда в довольно малых объёмах."
 atmosphere-tenuous_red: "Разреженная Атмосфера"
 atmosphere-tenuous_red_desc: "Эта планета практически лишена атмосферы либо обладает крайне разреженной газовой оболочкой в красных тонах, её характерный цвет определяется такими элементами как диоксид серы и диоксид кремния, которые в ней присутствуют, правда в довольно малых объёмах."
 atmosphere-thin_red: "Тонкая Атмосфера"
 atmosphere-thin_red_desc: "Эта планета обладает тонкой атмосферой в красных тонах, её характерный цвет определяется такими элементами как диоксид серы и диоксид кремния, которые в ней присутствуют, правда в довольно малых объёмах."
 atmosphere-thin_brown: "Тонкая Атмосфера"
 atmosphere-thin_brown_desc: "Эта планета обладает тонкой атмосферой в коричневых тонах, её характерный цвет определяется такими элементами как диоксид углерода или диоксида серы, которые в ней присутствуют, правда в довольно малых объёмах."
 atmosphere-thick_brown: "Плотная Атмосфера"
 atmosphere-thick_brown_desc: "Эта планета обладает плотной атмосферой, состоящей преимущественно из диоксида и монооксида углерода, которые и придают ей характерный коричневатый оттенок."
 atmosphere-thick_orange: "Плотная Атмосфера"
 atmosphere-thick_orange_desc: "Эта планета обладает плотной атмосферой, состоящей преимущественно из диоксида углерода, азота и метана, которые и придают ей характерный оранжевый оттенок."
 atmosphere-thick_yellow: "Плотная Атмосфера"
 atmosphere-thick_yellow_desc: "Эта планета обладает плотной атмосферой, состоящей преимущественно из диоксида углерода или диоксида серы, которые и придают ей характерный жёлтый оттенок."
 atmosphere-thick_teal: "Плотная Атмосфера"
 atmosphere-thick_teal_desc: "Эта планета обладает плотной атмосферой, состоящей преимущественно из азота и кислорода с небольшими примесями токсичных газов, которые и придают ей характерный бирюзовый оттенок."
 atmosphere-thick_blue: "Плотная Атмосфера"
 atmosphere-thick_blue_desc: "Эта планета обладает плотной атмосферой, состоящей преимущественно из азота и кислорода, которые и придают ей характерный синий оттенок."
 atmosphere-thick_deep_blue: "Плотная Атмосфера"
 atmosphere-thick_deep_blue_desc: "Эта планета обладает плотной атмосферой, состоящей преимущественно из азота и аргона, которые и придают ей характерный тёмно-синий оттенок."
 atmosphere-dense_orange: "Перенасыщенная Атмосфера"
 atmosphere-dense_orange_desc: "Эта планета обладает густой атмосферой, перенасыщенной азотом и метаном, которые и придают ей характерный оранжевый оттенок."
 atmosphere-dense_yellow: "Перенасыщенная Атмосфера"
 atmosphere-dense_yellow_desc: "Эта планета обладает густой атмосферой, перенасыщенной диоксидом углерода или диоксидом серы, которые и придают ей характерный жёлтый оттенок."
 atmosphere-dense_blue: "Перенасыщенная Атмосфера"
 atmosphere-dense_blue_desc: "Эта планета обладает густой атмосферой, перенасыщенной азотом и кислородом с высокой концентрацией водяного пара, которые и придают ей характерный синий оттенок."
 atmosphere-very_dense_grey: "Черезвычайно Плотная Атмосфера"
 atmosphere-very_dense_grey_desc: "Эта планета обладает черезвычайно плотной атмосферой, имеющей в своём составе гелий и формируя облака монооксида углерода, которые и придают ей характерный серый оттенок."
 atmosphere-very_dense_brown: "Черезвычайно Плотная Атмосфера"
 atmosphere-very_dense_brown_desc: "Эта планета обладает черезвычайно плотной атмосферой, имеющей в своём составе водород, гелий и формируя облака монооксида углерода, которые и придают ей характерный коричневый оттенок."
 atmosphere-very_dense_yellow: "Черезвычайно Плотная Атмосфера"
 atmosphere-very_dense_yellow_desc: "Эта планета обладает черезвычайно плотной атмосферой, имеющей в своём составе водород, гелий и формируя облака аммиака, которые и придают ей характерный жёлтый оттенок."
 atmosphere-very_dense_red: "Черезвычайно Плотная Атмосфера"
 atmosphere-very_dense_red_desc: "Эта планета обладает черезвычайно плотной атмосферой, имеющей в своём составе водород, гелий и формируя силикатные облака, которые и придают ей характерный красный оттенок."
 atmosphere-very_dense_teal: "Черезвычайно Плотная Атмосфера"
 atmosphere-very_dense_teal_desc: "Эта планета обладает черезвычайно плотной атмосферой, имеющей в своём составе водород и гелий, которые и придают ей характерный бирюзовый оттенок."
 atmosphere-very_dense_blue: "Черезвычайно Плотная Атмосфера"
 atmosphere-very_dense_blue_desc: "Эта планета обладает черезвычайно плотной атмосферой, имеющей в своём составе водород, гелий и, при наличии облачного слоя, формируя облака водяного пара. Эти свойства и придают ей характерный синий оттенок."
 atmosphere-very_dense_deep_blue: "Черезвычайно Плотная Атмосфера"
 atmosphere-very_dense_deep_blue_desc: "Эта планета обладает черезвычайно плотной атмосферой, имеющей в своём составе водород, гелий и формируя облака метана, которые и придают ей характерный тёмно-синий оттенок."

 # Atmosphere - Habitable
 atmosphere-habitable_optimal: "Оптимальная Атмосфера"
 atmosphere-habitable_optimal_desc: "На этой планете усреднённая, пригодная для дыхания, атмосфера, состоящая из азота и кислорода, позволяющая спокойное дыхание без дополнительного снаряжения и, как следствие, проживание в малонаселённых сельских районах."
 atmosphere-habitable_polluted: "Загрязнённая Атмосфера"
 atmosphere-habitable_polluted_desc: "Атмосфера этой планеты содержит в верхних слоях высокую концентрацию загрязняющих веществ, что снижает общий уровень удовлетворённости местного населения."
 atmosphere-habitable_oxygen_rich: "Кислородная Атмосфера"
 atmosphere-habitable_oxygen_rich_desc: "Атмосфера этой планеты содержит повышенное количество кислорода, что увеличивает риск возгораний на промышленных производствах."
 atmosphere-habitable_greenhouse_rich: "Парниковая Атмосфера"
 atmosphere-habitable_greenhouse_rich_desc: "Атмосфера этой планеты содержит высокую концентрацию парниковых газов, из-за чего пребывание местного населения на открытом воздухе требует использования индивидуальных средств защиты дыхания."
 atmosphere-habitable_water_rich: "Влажная Атмосфера"
 atmosphere-habitable_water_rich_desc: "Атмосфера этой планеты отличается крайне высокой влажностью, что, на удвиление, снижает её привлекательность."

 # Submerged colonies
 submerged-oceanic: "Затопленная Плавучая Колония"
 submerged-oceanic_desc: "Данная колония была основана в водной среде. Строительство инфраструктуры, устойчивой к непогоде, сложнее традиционной и занимает большее количество времени."
 submerged-sub_oceanic: "Затопленная Океаническая Колония"
 submerged-sub_oceanic_desc: "Данная колония была основана в океанических глубинах. Строительство инфраструктуры, устойчивой к повышенному давлению, сильно сложнее традиционной и определённо занимает большее количество времени.\n\nПоскольку лишь небольшой процент планеты состоит из суши, количество доступных перспективных районов будет уменьшено."
 submerged-terrestrial: "Затопленная Наземная Колония"
 submerged-terrestrial_desc: "Данная колония была основана на океаническом дне. Строительство инфраструктуры, устойчивой к повышенному давлению, кратно сложнее традиционной и занимает намного большее количество времени.\n\nПоскольку значительная часть планеты состоит из суши, количество доступных перспективных районов будет уменьшено."
 submerged-sub_terrestrial: "Затопленная Подземная Колония"
 submerged-sub_terrestrial_desc: "Данная колония была основана под океаническим дном. Строительство инфраструктуры, устойчивой к столь невероятному давлению, занимает громадное количество времени.\n\nПоскольку большая часть планеты состоит из суши, количество доступных районов также значительно уменьшено."

 # Subterranean colonies
 subterranean_terraformed: "Подземное Терраформирование"
 subterranean_terraformed_desc: "На этой планете завершён проект черезвычайной сложности. Подземное терраформирование. Были созданы обширные системы пещер в герметичной среде с оптимальным давлением, составом атмосферы, температурой и даже внутренним климатом, а также искусственным циклом дня и ночи.\n\nПодземное пространство черезвычайно урбанизировано, а все другие типы районов строятся на поверхности, что значительно увеличивает время их возведения из-за сложности в логистике. Защищённая среда обеспечивает более комфортные условия, чем те что присутствуют на поверхности, жизнь местного населения всё ещё, преимущественно, проходит «внутри», снижая уровень счастья и рост местного населения."
 surfaced_colony: "Поверхостная Колония"
 surfaced_colony_desc: "Психологический эффект от выхода на поверхность после длительного подземного существования приводит к повышению настроения местного населения."

 # Shallow oceanics
 shallow_water_ocean: "Мелководный Океанический Мир"
 shallow_water_ocean_desc: "Этот океанический мир имеет как глубокие, так и мелководные области, напоминая полностью затопленный теллурический мир. Это делает возможной колонизацию планеты водными видами или её терраформирование для удобства наземных обитателей."
 shallow_ammonia_ocean: "Мелководный Аммиачный Океанический Мир"
 shallow_ammonia_ocean_desc: "Этот океанический мир имеет как глубокие, так и мелководные области, напоминая полностью затопленный теллурический мир. Это делает возможной колонизацию планеты водными видами или её терраформирование для удобства наземных обитателей."

 ## Planet Class Modifiers

 # Super-telluric
 class_chloerosgaean: "§MКласс Гайа-Хлороc§!"
 class_chloerosgaean_desc: "Класс Гайа-Хлороc (идеально-зеленый) присваивается умеренным супер-теллурическим мирам, разделённым на зелёные континенты заполненные обширными регионами начтная с травянистых равнин заканчивая густой древесной лесопосадкой, а также мелководными океанами, богатыми флорой, такой как ламинариевые леса и морские травы.\n\n"
 class_xirosgaean: "§MКласс Гайа-Ксирос§!"
 class_xirosgaean_desc: "Класс Гайа-Ксирос (идеально-засушливый) присваивается горячим супер-теллурическим мирам, разделённым на континенты с обширными саваннами и более высокой плотностью растительности вблизи источников пресной воды, а также мелководными тёплыми океанами, богатыми флорой, такой как различные водоросли и кораллы.\n\n"
 class_cryogaean: "§MКласс Гайа-Криос§!"
 class_cryogaean_desc: "Класс Гайа-Криос (идеально-хладный) присваивается холодным супер-теллурическим мирам, разделённым на континенты обладающими обильными источниками воды, подогреваемыми геотермальной активностью планеты, которые создают стабильную среду для процветания специфической флоры и фауны.\n\n"
 # Super-pelagic
 class_okeanosgaean: "§OКласс Гайа-Океанос§!"
 class_okeanosgaean_desc: "Класс Гайа-Океанос (идеально-океанический) присваивается крупным умеренным пелагическим мирам, полностью покрытым мелководным океаном с идеальными условиями освещённости, давления и температуры для фотосинтеза морской жизни.\n\n"

 # Pelagic
 class_archipelagic: "§GКласс Архипелагик§!"
 class_archipelagic_desc: "Класс Архипелагик (главно-морской) присваивается умеренным пелагическим мирам с рассеянными массивами суши и архипелагами, богатыми морской жизнью.\n\n"
 class_pangaean: "§GКласс Пангеаник§!"
 class_pangaean_desc: "Класс Пангеаник (обще-земной) присваивается умеренным пелагическим мирам, обладающим супер-континентом, составляющим большую часть суши планеты. Повышенная влажность у побережий сильно контрастирует с засушливым внутренним регионом, гарантируя разнообразие биосферы.\n\n"
 class_megalopelagic: "§GКласс Мегало-Пелагик§!"
 class_megalopelagic_desc: "Класс Мегало-Пелагик (макро-морской) присваивается крупным умеренным пелагическим мирам с континентальными островами и хорошим балансом морской и наземной жизни.\n\n"
 class_chloeroslykofos: "§GКласс Хлоро-Ликoфос§!"
 class_chloeroslykofos_desc: "Класс Хлоро-Ликoфос (зелено-сумрачный) присваивается умеренным приливно-заблокированным пелагическим мирам, одна из сторон которых всегда обращена к звезде и представляет собой горячую сухую пустошь, переходящую в саванны и густые леса, а затем — в океан жидкой воды на ночной стороне, где температура достаточно низка для предотвращения испарения плаги. Тёплые ветра с дневной стороны и океан ночной стороны создают умеренный климат с богатым биоразнообразием вдали от солнечного зноя.\n\n"
 class_panpelagic: "§OКласс Пан-Пелагик§!"
 class_panpelagic_desc: "Класс Пан-Пелагик (всe-морской) присваивается умеренным пелагическим мирам, полностью покрытым водой, с множеством участков мелководья, обеспечивающих идеальные условия освещённости, давления и температуры для фотосинтеза морской жизни.\n\n"
 # Cryo-pelagic
 class_cryopelagic "§EКласс Крио-Пелагик§!"
 class_cryopelagic_desc: "Класс Крио-Пелагик (хладно-морской) присваивается холодным пелагическим мирам, большая часть поверхности которых покрыта толстым слоем льда, за исключением тёплых экваториальных широт. Несмотря на суровые поверхностные условия, морская жизнь в подобных мирах процветает прямо подо льдом, где тёплые океанические течения и геотермальная активность поддерживают устойчивую экосистему.\n\n"
 class_pagosmegalopelagic: "§EКласс Паго-Мегало-Пелагик§!"
 class_pagosmegalopelagic_desc: "Класс Паго-Мегало-Пелагик (ледовито-макро-морской) присваивается крупным холодным пелагическим мирам, полностью покрытым океаном, поверхность которого в основном пребывает в замёрзшем состоянии, за исключением низких широт, где более высокие температуры образуют полыньи и айсберги.\n\n"
 class_pagoslykofos: "§EКласс Паго-Ликoфос§!"
 class_pagoslykofos_desc: "Класс Паго-Ликoфос (ледовито-сумрачный) присваивается холодным приливно-заблокированным пелагическим мирам, одна из сторон которых всегда обращена к звезде и полностью покрыта водой пребывающей в жидком состоянии, постепенно переходящей в твёрдое по мере удаления от границ освещённой зоны. Крупные ледники формируются в сумеречной зоне, однако, поскольку морская жизнь может эволюционировать только в более тёплых водах, почва для поверхностной растительности практически отсутствует.\n\n"
 class_ammoniapelagic: "§EКласс Аммиако-Пелагик§!"
 class_ammoniapelagic_desc: "Класс Аммиако-Пелагик (аммиачно-морской) присваивается холодным пелагическим мирам, полностью покрытым раствором воды и аммиака, что позволяет сохранять жидкое состояние поверхности при довольно низких температурах. Мелководные зоны этих миров могут поддерживать экзотическую морскую жизнь, специально адаптированную к подобным условиям.\n\n"
 # Thermo-pelagic
 class_xirospelagic: "§YКласс Ксиро-Пелагик§!"
 class_xirospelagic_desc: "Класс Ксиро-Пелагик (сухо-морской) присваивается горячим пелагическим мирам, которые теряет воду из-за испарения в результате парникового эффекта, оставляя обширные пустынные области, некогда покрытые остатками океанов. Хотя оставшийся тёплый кислотный океан всё ещё поддерживает в них морскую жизнь, новые виды постепенно осваивают сушу, включая низкоуровневую растительность в прибрежных зонах.\n\n"
 class_thermomegalopelagic: "§YКласс Термо-Мегало-Пелагик§!"
 class_thermomegalopelagic_desc: "Класс Термо-Мегало-Пелагик (горяче-макро-морской) присваивается крупным горячим пелагическим мирам, где глобальный океан разделён экваториальным массивом суши. Слабая наземная биопродуктивность этих миров недостаточна для значительного поглощения углекислого газа из их атмосферы, большая часть которого растворяется в океане, приводя к его постепенному закислению."
 # Telluric
 class_chloerosipeirous: "§GКласс Хлоро-Ипейрос§!"
 class_chloerosipeirous_desc: "Класс Хлоро-Ипейрос (зелено-континентальный) присваивается умеренным теллурическим мирам, изобилующим разнообразными видами и хлорофилл-зависимой растительностью.\n\n"
 class_chloerosgenian: "§GКласс Хлоро-Гениан§!"
 class_chloerosgenian_desc: "Класс Хлоро-Гениан (зелено-генезисный) присваивается умеренным теллурическим мирам, демонстрирующим недавний взрыв биологического разнообразия, адаптированного к мягкому климату.\n\n"
 class_porphuragenian: "§GКласс Порфура-Гениан§!"
 class_porphuragenian_desc: "Класс Порфура-Гениан (пурпурно-генезисный) класс присваивается умеренным теллурическим мирам, изобилующим разнообразными видами и растительностью произростающей на основе потребления ретиналя.\n\n"
 class_photosgenian: "§GКласс Фото-Гениан§!"
 class_photosgenian_desc: "Класс Фото-Гениан (свето-генезисный) присваивается умеренным теллурическим мирам, изобилующим разнообразными видами и биолюминесцентной растительностью, адаптированной к длительным ночам или постоянной слабой освещённости.\n\n"
 class_alatouchosmegagi: "§GКласс Алаточ-Мегаги§!"
 class_alatouchosmegagi_desc: "Класс Алаточ-Мегаги (солёно-мегаземельный) присваивается крупным и умеренным теллурическим мирам с многочисленными солёными водоёмами, ограничивающими эволюцию солеустойчивыми водорослями и бактериями, а также наземной флорой низкой плотности.\n\n"
 # Thermo-telluric
 class_xirosipeirous: "§YКласс Ксиро-Ипейрос§!"
 class_xirosipeirous_desc: "Класс Ксиро-Ипейрос (сухо-континентальный) присваивается горячим теллурическим мирам, где большая часть биоразнообразия сосредоточена в тёплых океанах или вблизи источников воды.\n\n"
 class_thermogenian: "§YКласс Термо-Гениан§!"
 class_thermogenian_desc: "Класс Термо-Гениан (горяче-генезисный) присваивается горячим теллурическим мирам, демонстрирующим недавний всплеск биологического разнообразия в тёплых океанах и на суше вблизи источников воды.\n\n"
 class_anthirosmegagi: "§YКласс Антиро-Мегаги§!"
 class_anthirosmegagi_desc: "Класс Антиро-Мегаги (красочно-мегаземельный) присваивается крупным и горячим теллурическим мирам, в которых доминирует красноватая растительность, адаптированная к обширным засушливым равнинам."
 class_archaeogenian: "§YКласс Архео-Гениан§!"
 class_archaeogenian_desc: "Класс Архео-Гениан (древне-генезисный) присваивается развивающимся теллурическим мирам, находящимся на ранней геологической стадии, с обширной вулканической активностью и биосферной диверсификацией как на суше так и в океанах. Обильные водные ресурсы в виде океанов богаты морской жизнью, а на суше распространяются первые леса, дополнительно детоксифицирующие атмосферу за счёт снижения концентрации углекислого газа.\n\n"
 # Cryo-telluric
 class_pagosipeirous: "§EКласс Паго-Ипейрос§!"
 class_pagosipeirous_desc: "Класс Паго-Ипейрос (ледовито-континентальный) присваивается холодным теллурическим мирам с обширным оледенением, в которых процветают виды, адаптированные к холодному климату и обитающие в наиболее тёплых регионах планеты.\n\n"
 class_cryogenian: "§EКласс Крио-Гениан§!"
 class_cryogenian_desc: "Класс Крио-Гениан (хладно-генезисный) присваивается холодным теллурическим мирам, демонстрирующим недавний всплеск биологического разнообразия вокруг геотермальных источников и более тёплых областей в низких широтах планеты.\n\n"
 class_cryomegagi: "§EКласс Крио-Мегаги§!"
 class_cryomegagi_desc: "Класс Крио-Мегаги (хладно-мегаземельный) присваивается крупным и холодным теллурическим мирам, обладающим жидким океаном у экватора, подпитываемым огромными системами рек геотермальных и родниковых вод, которые прогревают берега и сдерживают распространение льда в холодные сезоны до восстановления баланса в устойчивом цикле.\n\n"
 class_krystalloipeirous: "§EКласс Кристалло-Ипейрос§!"
 class_krystalloipeirous_desc: "Класс Кристалло-ипейрос (кристаллически-континентальный) присваивается холодным теллурическим мирам обладающим обширными залежами экзотических кристаллических пород, удивительно тёплыми на ощупь, которые предотвращают замерзание текучей воды и служат источником энергии для разнообразных видов синеватой растительности.\n\n"
 # Thalassic
 class_tropikostopio: "§GКласс Тропико-Топио§!"
 class_tropikostopio_desc: "Класс Тропико-Топио (тропико-ландшафтный) присваивается умеренным талассическим мирам обладающим крупными морями, подпитываемым огромными системами рек, благодаря которым на большей части планеты поддерживается влажный климат с растительностью древесного типа.\n\n"
 class_alpikostopio: "§GКласс Альпико-Топио§!"
 class_alpikostopio_desc: "Класс Альпико-Топио (альпийско-ландшафтный) присваивается холодным талассическим мирам, поверхность которых преимущественно покрывают горные хребты и плато. Плотная атмосфера и устойчивый круговорот воды поддерживают богатую биосферу на низких высотах.\n\n"
 class_chloerosmykiliaki: "§GКласс Хлоро-Микилиак§!"
 class_chloerosmykiliaki_desc: "Класс Хлоро-Микилиак (зелено-мицелиальный) присваивается умеренным талассическим мирам, экосистема которых основана на мицелии и грибах, приспособленных к влажной среде.\n\n"
 class_chloerosmegagi: "§GКласс Хлоро-Мегаги§!"
 class_chloerosmegagi_desc: "Класс Хлоро-Мегаги (зелено-мегаземельный) класс присваивается крупным умеренным талассическим мирам, покрытым густой хлорофилл-зависимой растительностью, среди которой разбросаны многочисленные озёра и моря, подпитываемые огромными системами рек.\n\n"
 class_megalochlorida: "§GКласс Мегало-Хлорида§!"
 class_megalochlorida_desc: "Класс Мегало-Хлорида (крупно-флористический) присваивается умеренным талассическим мирам, где среди лесов произрастают воистину гигантские древа. Благодаря высокой влажности и отсутствию выраженной смены сезонов леса покрывают большую часть поверхности этого вида планет.\n\n"
 class_livadi: "§GКласс Ливади§!"
 class_livadi_desc: "Класс Ливади (луговой) присваивается умеренным талассическим мирам с крупными морями, подпитываемыми огромными системами рек, создающими субтропический климат, в котором преобладают бескрайние травянистые равнины.\n\n"
 # Thermo-thalassic
 class_thermotopio: "§YКласс Термо-Топио§!"
 class_thermotopio_desc: "Класс Термо-Топио (горяче-ландшафтный) присваивается горячим талассическим мирам, обладающим крупными мелководными морями и водоносными горизонтами, богатыми питательными веществами, что позволяет биоразнообразию развиваться и процветать в этих регионах.\n\n"
 class_xirosvrachous: "§YКласс Ксиро-Врахос§!"
 class_xirosvrachous_desc: "Класс Ксиро-Врахос (сухо-скалистый) присваивается горячим талассическим мирам с преимущественно бесплодным ландшафтом и редкой растительностью, встречающейся лишь возле источников воды.\n\n"
 class_xirosmykiliaki: "§YКласс Ксиро-Микилиак§!"
 class_xirosmykiliaki_desc: "Класс Ксиро-Микилиак (сухо-мицелиальный) присваивается горячим талассическим мирам, экосистема которых основана на мицелии и грибах, приспособленных к засушливой среде.\n\n"
 class_thermomegagi: "§YКласс Термо-Мегаги§!"
 class_thermomegagi_desc: "Класс Термо-Мегаги (горяче-мегаземельный) присваивается крупным горячим талассическим мирам, обладающих тёплым океаном у экватора, вода которого интенсивно испаряется, затем конденсируется в высоких широтах и питает гигантские речные системы, возвращающие воду обратно в океан, поддерживая устойчивый непрерывный круговорот.\n\n"
 class_fykiatopio: "§YКласс Фикия-Топио§!"
 class_fykiatopio_desc: "Класс Фикия-Топио (водорослево-ландшафтный) присваивается горячим талассическим мирам, флора которых представлена преимущественно водорослями, процветающими в обширных морях, а также вдоль побережий, где сохраняется достаточный уровень влажности.\n\n"
 class_xiroslykofos: "§YКласс Ксиро-Ликофос§!"
 class_xiroslykofos_desc: "Класс Ксиро-Ликoфос (сухо-сумрачный) присваивается горячим приливно-заблокированным талассическим мирам с крайне контрастными условиями. Одна из сторон планеты должна быть постоянно обращена к звезде и раскалена, другая же - погружена в вечный холод и мрак, и лишь между ними существуют моря жидкой воды, подпитываемые её нестабильным круговоротом, поскольку большую часть влаги быстро уносят сверхмощные ветра. Растительность ограничивается невысокими травами и редко растущими деревьями с глубокой и мощной корневой системой.\n\n"
 # Cryo-thalassic
 class_cryotopio: "§EКласс Крио-Топио§!"
 class_cryotopio_desc: "Класс Крио-Топио (хладно-ландшафтный) присваивается холодным талассическим мирам, облдающим крупными морями, подогреваемыми геотермальной активностью планеты, что позволяет жизни процветать в этих тёплых водах и вдоль побережий где они протекают.\n\n"
 class_oreinos: "§EКласс Орейнос§!"
 class_oreinos_desc: "Класс Орейнос (высокогорный) присваивается холодным талассическим мирам, большая часть поверхности которых расположена высоко над уровнем моря и постоянно остаётся сухой, за исключением глубоких ущелий, сформированных эрозией быстрых, глубоко врезанных в них, рек.\n\n"
 class_cryomykiliaki: "§EКласс Крио-Микилиак§!"
 class_cryomykiliaki_desc: "Класс Крио-Микилиак (хладно-мицелиальный) присваивается холодным талассическим мирам, экосистема которых основана на мицелии и грибах, приспособленных к суровому холодному климату.\n\n"
 class_porphurachlorida: "§EКласс Порфура-Хлорида§!"
 class_porphurachlorida_desc: "Класс Порфура-Хлорида (пурпурно-флористический) присваивается холодным талассическим мирам с высокой вулканической активностью, из-за которой большая часть звёздного света не достигает поверхности планеты. Геотермальные источники и парниковый эффект поддерживают водоёмы в перманентно жидком состоянии, тогда как большая часть поверхности покрыта растительностью на основе ретиналя, хорошо приспособленной к самому слабому освещению.\n\n"
 class_stepikosmegagi: "§EКласс Степикос-Мегаги§!"
 class_stepikosmegagi_desc: "Класс Степикос-Мегаги (степно-мегаземельный) присваивается крупным холодным талассическим мирам с обширными равнинами вечной мерзлоты и травянистой растительностью. Из-за малого количества осадков и суровых погодных условий, длящихся практически круглый год, древесная растительность в данных мирах отсутствует.\n\n"
 # Tomb
 class_tomb: "§RКласс Могильник§!"
 class_tomb_desc: "Класс «Могильник» присваивается мирам, переживающим ядерную зиму, обладающим плотными слоями сажевых аэрозолей в атмосфере и высоким уровнем радиации на поверхности.\n\n"
 class_tomb_restored: "§RКласс Восстановленный Могильник§!"
 class_tomb_restored_desc: "Класс «Восстановленный Могильник» присваивается мирам, восстанавливающимся после ядерной зимы, имеющим последствия удаления атмосферных загрязнений посредством климатической инженерии и внедрения видов, приспосбливающихся или уже приспособленных к среде с сохраняющимися очагами радиации.\n\n"
 # Volcanic
 class_hadean: "§RКласс Катархей§!"
 class_hadean_desc: "Класс «Катархей» присваивается полурасплавленным мирам с плотной атмосферой, богатой углекислым газом и водяным паром вулканического происхождения, а также безжизненной поверхностью. Несмотря на то что температура поверхности слишком высока для того чтобы атмосферный водяной пар конденсировался и выпадал в виде дождей, планета, вероятно, обладает огромными запасами вод подземного происхождения. Все естественные обитаемые миры на ранних этапах своей геологической истории некогда относились к классу «Катархей», однако некоторые из уже эволюционировавших ранее миров могут вновь перейти в него вследствие чрезвычайно масштабного катаклизма."
 # Marginal
 class_cryovolcanic: "§HКласс Криовулканик§!"
 class_cryovolcanic_desc: "Класс «Криовулканик» присваивается крайне холодным мирам пограничного типа с бесплодной поверхностью, испещрённой озёрами и морями жидких углеводородов, а также широко распространённым криовулканизмом."
 class_hothouse: "§HКласс Парник§!"
 class_hothouse_desc: "Класс «Парник» присваивается раскалённым мирам пограничного типа, поверхность которых покрыта вулканическими равнинами, а плотная атмосфера состоит преимущественно из парниковых газов."
 class_carbide: "§HКласс Карбид§!"
 class_carbide_desc: "Класс «Карбид» присваивается богатым углеродом мирам пограничного типа, испещрённым вулканами, извергающими алмазы, и морями состоящими из природной смолы."
 class_ammoniacal: "§HКласс Аммоник§!"
 class_ammoniacal_desc: "Класс «Аммоник» присваивается богатым аммиаком мирам пограничного типа, отличающимся ландшафтами бурого цвета и морями, окрашенными в металлические цвета."
 class_primordial: "§HКласс Примодиал§!"
 class_primordial_desc: "Класс «Примодиал» присваивается бесплодным мирам пограничного типа, которые, по всей видимости, находятся на раннем этапе своей геологической истории и уже обладают условиями, необходимыми для зарождения жизни. Планета должна быть достаточно остывщей для того, чтобы водяной пар вулканического происхождения начал процесс конденсирования и выпадения в осадки, образуя первые водоёмы."
 class_hydroalkaline: "§HКласс Гидроалкалин§!"
 class_hydroalkaline_desc: "Класс «Гидроалкалин» присваивается холодным мирам пограничного типа, в которых роль переменного атмосферного газа вместо водяного пара исполняет аммиак, а океаны имеют бурый окрас из-за высокой концентрации растворённых в них щелочных металлов. В подобных мирах возникли и процветают экзотические формы жизни, использующие аммиак в качестве растворителя, а растения способны выбирать между фотосинтезом и хемосинтезом при недостатке света родительской звезды."
 class_azure: "§HКласс Лазурь§!"
 class_azure_desc:0 "Класс «Лазурь» присваивается холодным мирам пограничного типа использующими аммиак, вместо воды. Они должны быть богаты на лёгкие металлы и агрессивные газы, такие как кислород, хлор и сера. Вблизи водоёмов жидкого аммиака должна возникнуть редкая экзотическая растительность."
 class_hydrocarbonal: "§HКласс Гидрокарбон§!"
 class_hydrocarbonal_desc: "Класс «Гидрокарбон» присваивается крайне холодным мирам пограничного типа использующими метан, вместо воды. Крио-вулканические извержения выбрасывают метан в атмосферу, где на больших высотах он смешивается с азотом и разлагается под действием излучения звезды, после чего вновь соединяется в более сложные соединения и выпадает на поверхность в виде различных углеводородов."
 class_acidic: "§HКласс Ацидик§!"
 class_acidic_desc: "Класс «Ацидик» присваивается горячим мирам пограничного типа использующими серную кислоту, вместо воды. Вулканическая активность выбрасывает в атмосферу большие количества серы, которая затем выпадает на поверхность в виде кислотных дождей. В подобных условиях могут возникать и даже развиваться экзотические формы жизни."
 class_alkali: "§HКласс Алкали§!"
 class_alkali_desc: "Класс «Алкали» присваивается горячим мирам пограничного типа с плотной атмосферой. На поверхности которых всё ещё встречается вода и немногочисленная выносливая растительность, однако атмосфера которых остаётся токсичной из-за высокой концентрации парниковых газов."
 class_auric: "§HКласс Аурик§!"
 class_auric_desc: "Класс «Аурик» присваивается горячим мирам пограничного типа, поверхность которых остаётся преимущественно бесплодной из-за интенсивного звёздного излучения. Вблизи источников воды на них должна встречаться разреженная экзотическая растительность, устойчивая к радиации, а в самих водоёмах должна процветать морская жизнь, защищённая от излучения толщей воды."
 class_saltflat: "§HКласс Солончак§!"
 class_saltflat_desc: "Класс «Солончак» присваивается горячим мирам пограничного типа, обладающим огромными солончаками, возникшими на местах древних океанов. Их разреженная азотно-кислородная атмосфера с небольшим содержанием водяного пара должна поддерживаеться благодаря многочисленным гигантским подземным пещерам, заполненным богатыми ламинарией водами."
 class_marsh: "§HКласс Топь§!"
 class_marsh_desc: "Класс «Топь» присваивается влажным мирам пограничного типа, поверхность которых покрыта болотами, топями и трясинами. Подобные места выделяют огромные объёмы метана, создавая парниковый эффект, поддерживающий относительно стабильную, но при этом токсичную среду с повышенной температурой."
 class_desert: "§HКласс Дюна§!"
 class_desert_desc: "Класс «Дюна» присваивается горячим мирам пограничного типа, поверхность которых пустынна и покрыта немногочисленными водоёмами, возле которых должны быть способны произрастать особые лишайники, способствующие насыщению атмосферы кислородом и снижению концентрации в ней углекислого газа."
 class_barren: "§HКласс Бесплод§!"
 class_barren_desc: "Класс «Бесплод» присваивается бесплодным мирам пограничного типа, полностью лишённым растительности, но обладающим крупными водоносными жилами, которые в отдельных регионах планеты выходят прямо на её поверхность, образуя при этом различного рода водоёмы."
 # Oceanic
 class_glaciated_ocean: "§OКласс Ледниковый Океан§!"
 class_glaciated_ocean_desc: "Класс «Ледниковый Океан» присваивается крайне холодным океаническим мирам с полностью замёрзшей поверхностью. Они часто имеют низкую плотность, поскольку состоят главным образом из замёрзших летучих веществ, таких как вода, аммиак или метан. Под ледяной корой таких планет обычно находятся жидкие океаны, которые в зависимости от своего состава и близости к геотермальным источникам могут даже содержать примитивные формы жизни."
 class_ammonia_ocean: "§OКласс Аммиачный Океан§!"
 class_ammonia_ocean_desc: "Класс «Аммиачный Океан» присваивается холодным океаническим мирам, полностью покрытым океаном, состоящим из эвтектической смеси аммиака и воды. Температура и давление на планете должны позволять океанам подобного типа сохранять своё жидкое состояние."
 class_methane_ocean: "§OКласс Метановый Океан§!"
 class_methane_ocean_desc: "Класс «Метановый Океан» присваивается холодным океаническим мирам, полностью покрытым океаном, состоящим из углеводородов, таких как этан и метан. Температура и давление на планете должны позволять океанам подобного типа сохранять своё жидкое состояние."
 class_water_ocean: "§OКласс Водный Океан§!"
 class_water_ocean_desc: "Класс «Водный Океан» присваивается умеренным океаническим мирам, полностью покрытым океаном жидкой воды. Температура и давление на планете должны позволять океанам подобного типа сохранять своё жидкое состояние."
 # Barren
 class_rusted: "§LКласс Ржавый§!"
 class_rusted_desc: "Класс «Ржавый» присваивается бесплодным каменистым мирам, достаточно массивным для удержания атмосферы, поверхность которых покрыта толстым слоем мелкодисперсной пыли оксида железа."
 class_volcanic: "§LКласс Вулканик§!"
 class_volcanic_desc: "Класс «Вулканик» присваивается бесплодным каменистым мирам с интенсивной вулканической активностью, поверхностью, покрытой лавовыми равнинами, и разреженной атмосферой, состоящей преимущественно из диоксида серы."
 class_frozen: "§LКласс Ледяник§!"
 class_frozen_desc: "Класс «Ледяник» присваивается бесплодным каменистым мирам, поверхность которых состоит из горных пород и летучих льдов. При достаточном нагреве внутренними источниками тепла или приливными силами под поверхностью данных миров могут образовываться жидкие моря и даже океаны."
 class_anthracene: "§LКласс Антрацен§!"
 class_anthracene_desc: "Класс «Антрацен» присваивается бесплодным каменистым мирам, богатым антрацитом и другими соединениями углерода, что может указывать на существование в прошлом богатой биосферы."
 class_desolate: "§LКласс Пустошь§!"
 class_desolate_desc: "Класс «Пустошь» присваивается бесплодным каменистым мирам с обширными впадинами и кратерами различных размеров, что указывает на возможное существование в прошлом жидких океанов на поверхности, исчезнувших, вероятно, в результате какого-то древнего катаклизма."
 class_rugged: "§LКласс Суровид§!"
 class_rugged_desc: "Класс «Суровид» присваивается бесплодным каменистым мирам, чья бурная геологическая история сформировала поверхность, покрытую горными хребтами и гигантскими пещерными системами. Крупные водоносные горизонты, вероятно, поддерживают ограниченную гидросферу, о чём свидетельствуют присутствие водяного пара в атмосфере и редких поверхностных ледяных шапок."
 # Airless
 class_chthonian: "§LКласс Хтоник§!"
 class_chthonian_desc: "Класс «Хтоник» присваивается безвоздушным каменистым мирам, представляющим собой металлическое ядро газового гиганта, который некогда мигрировал из внешней области звёздной системы к звезде и впоследствии полностью растерял свою газовую оболочку."
 class_metallic: "§LКласс Металлик§!"
 class_metallic_desc: "Класс «Металлик» присваивается безвоздушным каменистым мирам, которые обычно формируется вблизи звёзд, в протопланетном диске которых преобладает богатые железом материалы. Они часто обладают крупными железо-никелевыми ядрами и тонкой силикатной мантией, вследствие чего геологически неактивны."
 class_selenic: "§LКласс Селен§!"
 class_selenic_desc: "Класс «Селен» присваивается безвоздушным каменистым мирам с высокой концентрацией соединений кремния по всей поверхности. Они часто покрыты метеоритными кратерами, сохранившимися на протяжении миллиардов лет благодаря отсутствию каких-либо процессов эрозии."
 # Molten
 class_magma: "§PКласс Магма§!"
 class_magma_desc: "Класс «Магма» присваивается расплавленным мирам с разреженной токсичной атмосферой или отсутствующей вовсе. Лава из их недр должна свободно растекаться по поверхности вследствие непрерывных вулканических извержений, а экстремально высокая температура не позволяет ей затвердеть, формируя частично расплавленную поверхность или, в наиболее экстремальных случаях, глобальный лавовый океан."
 # Gaseous
 class_super_giant: "§SКласс Сверхгигант§!"
 class_super_giant_desc: "Класс «Сверхгигант» присваивается газовым мирам, значительно превосходящим по массе рядовые газовые гиганты, пусть и не обязательно по размерам, поскольку возросшая гравитация имеет свойство сжимать многочисленные планетарные слои."
 class_ammonia-clouded_giant: "§SКласс Облачный Аммоник§!"
 class_ammonia-clouded_giant_desc: "Класс «Облачный Аммоник» является, вероятно, наиболее распространённым типом газовых гигантов. Его атмосфера состоит главным образом из водорода и гелия, а так-же содержит обширные слои хорошо различимых аммиачных облаков."
 class_water-clouded_giant: "§SКласс Облачный Водяник§!"
 class_water-clouded_giant_desc: "Класс «Облачный Водяник» характеризуется атмосферой, состоящей преимущественно из водорода и гелия. Планета слишком тёплая для образования аммиачных облаков, поэтому во внешних слоях происходит активный круговорот воды: водяной пар поднимается из более горячих внутренних областей, конденсируется в гигантские облака и выпадает дождём обратно в непрерывном цикле."
 class_cloudless_giant: "§SКласс Безоблачный Гигант§!"
 class_cloudless_giant_desc: "Класс «Безоблачный Гигант» отличается атмосферой, состоящей главным образом из водорода и гелия. Глобальный облачный покров отсутствует, в основном из-за острой нехватки химических соединений, способных конденсировать облака."
 class_alkaline_giant: "§SКласс Щелочной Гигант§!"
 class_alkaline_giant_desc: "Класс «Щелочной Гигант» присваивается очень горячим газовым мирам, в атмосфере которых основным соединением, содержащим углерод, становится монооксид углерода вместо уже привычного нам метана, а также присутствуют высокие концентрации щелочных металлов."
 class_silicate_giant: "§SКласс Силикатный Гигант§!"
 class_silicate_giant_desc: "Класс «Силикатный Гигант» присваивается чрезвычайно горячим газовым мирам с высокими концентрациями силикатов и железа во внешних облачных слоях."
 class_helium_giant: "§SКласс Гелиевый Гигант§!"
 class_helium_giant_desc: "Класс «Гелиевый Гигант» характеризуется атмосферой, в которой преобладает преимущественно гелий. Обычно такие планеты сформировались как обычные газовые гиганты, обращавшиеся довольно близко к своей звезде, где более лёгкие газы постепенно испарялись в космос, перманентно уменьшая концентрацию водорода и при этом увеличивая концентрацию гелия."
 class_frigid_giant: "§SКласс Ледяной Гигант§!"
 class_frigid_giant_desc: "Класс «Ледяной Гигант» присваивается газовым мирам, внутренние области которых выделяют сликом малое количество тепла, из-за чего их внешний вид остаётся почти однородным вследствие черезвычайно-слабой атмосферной турбулентности."
 class_methane_giant: "§SКласс Метановый Гигант§!"
 class_methane_giant_desc: "Класс «Метановый Гигант» присваивается газовым мирам, обладающим горячим внутренним метановым слоем, в котором формируются и выпадают в осадок алмазы. При их осаждении на твёрдое ядро выделяется много тепла."
 class_turbulent_giant: "§SКласс Турбулентный Гигант§!"
 class_turbulent_giant_desc: "Класс «Турбулентный Гигант» присваивается газовым мирам, обладающим внутренним слоем жидкой металлизарованной воды и аммиака под экстремальным давлением и температурой, что приводит к образованию плотного и крайне турбулентного облачного покрова."
 class_temperate_giant: "§SКласс Умеренный Гигант§!"
 class_temperate_giant_desc: "Класс «Умеренный Гигант» присваивается газовым мирам, в которых между облаками водяного пара и сверх-критическим океаном располагаются слои жидкой воды."
 
 # Unused 
 class_mukesgenian_desc: "Класс Мукес-Гениан (грибо-генезисный) присваивается умеренным террестриальным мирам, экосистема которых основана на мицелии и грибах, способных выдерживать повышенный уровень звёздного излучения.\n\n"
 class_haloarchaean_desc: "Класс Гало-Археан (свето-древний) присваивается горячим террестриальным мирам, обладающим примитивной жизнью, представленной преимущественно гало-фильными видами бактерий, обитающими в насыщенных солью водоёмах и неподалёку от них.\n\n"