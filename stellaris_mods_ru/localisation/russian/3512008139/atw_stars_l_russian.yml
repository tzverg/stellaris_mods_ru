 ###Star Classes
 pc_d_star: "Белый Карлик"
 pc_d_star_desc: "Звёзды класса «D», широко известны как белые карлики, представляют из себя остатки звёздных ядер, состоящие преимущественно из материи с электронным вырождением. Считается, что белые карлики являются конечной стадией эволюции звёзд, масса которых недостаточна для превращения в нейтронную звезду. При образовании белый карлик имеет очень высокую температуру, но, поскольку у него нет источника энергии, он постепенно излучает всю свою энергию и остывает." 

