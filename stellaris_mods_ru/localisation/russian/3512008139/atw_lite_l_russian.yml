 ### Decisions
 decision_atmospheric_manipulation: "Манипуляция Атмосферой"
 decision_atmospheric_manipulation_desc: "Как только атмосфера этой планеты будет очищена от слоев с высокой токсичностью, мы сможем приступить к реализации широкомасштабного планетарного инженерного проекта по преобразованию атмосферы, направленного на создание полностью безопасной и пригодной для дыхания окружающей среды.\n\nСтоимость реализации этого проекта зависит от размера планеты."
 decision_tomb_restoration: "Оживление Мира Гробницы"
 decision_tomb_restoration_desc: "Если удастся восстановить атмосферу этой планеты путем удаления загрязняющих её веществ и снижения уровня токсичности, на её поверхности вновь сможет зародиться жизнь."
 decision_terraforming_candidate_upgrade: "Адаптировать Атмосферу"
 decision_terraforming_candidate_upgrade_desc: "В этой звездной системе имеется небесное тело, помеченное как «кандидат для терраформирования». При наличии необходимых технологий, ресурсов и смелости научного руководства - его атмосферу можно адаптировать для обеспечения возможности постоянного проживания на его поверхности.\n\nЭтот проект будет доступен только в том случае, если «кандидат для терраформирования» находится в одной и той же системе с уже колонизированным миром, а его стоимость будет зависеть от размера самого «кандидата»."
 decision_frozen_candidate_upgrade: "Адаптировать Ледяную Атмосферу"
 decision_frozen_candidate_upgrade_desc: "В этой звездной системе имеется небесное тело, помеченное как «кандидат для терраформирования». При наличии необходимых технологий, ресурсов и смелости научного руководства - его «ледяную» атмосферу можно адаптировать для обеспечения возможности постоянного проживания на его поверхности.\n\nЭтот проект будет доступен только в том случае, если «кандидат для терраформирования» находится в одной и той же системе с уже колонизированным миром, а его стоимость будет зависеть от размера самого «кандидата»."
 decision_toxic_candidate_upgrade: "Адаптировать Токсичную Атмосферу"
 decision_toxic_candidate_upgrade_desc: "В этой звездной системе имеется небесное тело, помеченное как «кандидат для терраформирования». При наличии необходимых технологий, ресурсов и смелости научного руководства - его «токсичную» атмосферу можно адаптировать для обеспечения возможности постоянного проживания на его поверхности.\n\nЭтот проект будет доступен только в том случае, если «кандидат для терраформирования» находится в одной и той же системе с уже колонизированным миром, а его стоимость будет зависеть от размера самого «кандидата»."
 decision_surface_colony: "Колонизация Поверхности"
 decision_surface_colony_desc: "Если показатель пригодности небесного тела для проживания превысит 70%, перенос крупных городов на его поверхность станет реальным. После столь долгого пребывания в подземных гротах, возвращение под открытое небо значительно повысит уровень общего счастья населения."
 ### Tooltips
 effect_atmospheric_manipulation: "Текущий модификатор «Атмосфера» будет заменен на версию «Оптимальная».\n\nЕсли планета относится к классу «Мир Гробница», то изменится и среда обитания, и планета станет «Восстановленной Гробницей»."
 
 ### Projects
 BARREN_ATMOSPHERIC_MANIPULATION: "Адаптация Бесплодной Среды"
 BARREN_ATMOSPHERIC_MANIPULATION_DESC: "Все необходимые ресурсы собраны, а этот масштабный геоинженерный проект находится в режиме предподготовки, ожидая лишь сплочённую научную команду.\n\nПо завершении данного проекта атмосфера планеты должна стать более плотной, с повышенным давлением и способностью удерживать большее количество тепла, что в свою очередь позволит появиться первым скоплениям жидкой воды на участках поверхности.\nХотя результат будет далек от идеального представления обитаемого мира, его будет достаточно для того, чтобы отважные первопроходцы смогли обосновать на поверхности постоянные аванпосты."
 FROZEN_ATMOSPHERIC_MANIPULATION: "Адаптация Ледяной Среды"
 FROZEN_ATMOSPHERIC_MANIPULATION_DESC: "Все необходимые ресурсы собраны, а этот масштабный геоинженерный проект находится в режиме предподготовки, ожидая лишь сплочённую научную команду.\n\nПо завершении данного проекта атмосфера планеты должна стать более плотной, с повышенным давлением и способностью удерживать большее количество тепла, что в свою очередь позволит оттаять значительной части замерзшей поверхности и, что довольно важно, остаться при этом в жидком состоянии.\nХотя результат будет далек от идеального представления обитаемого мира, его будет достаточно для того, чтобы отважные первопроходцы смогли обосновать на поверхности постоянные аванпосты."
 TOXIC_ATMOSPHERIC_MANIPULATION: "Адаптация Токсичной Среды"
 TOXIC_ATMOSPHERIC_MANIPULATION_DESC: "Все необходимые ресурсы собраны, а этот масштабный геоинженерный проект находится в режиме предподготовки, ожидая лишь сплочённую научную команду.\n\nПо завершении данного проекта атмосфера планеты должна стать более тонкой, с пониженным давлением и меньшим парниковым эффектом, что в свою очередь позволит сформировать гидросферу на поверхности планеты со стабильной цикличностью.\nХотя результат будет далек от идеального представления обитаемого мира, его будет достаточно для того, чтобы отважные первопроходцы смогли обосновать на поверхности постоянные аванпосты."
 
 ### Deposits
 d_cryo_volcano: "£blocker£ Криовулканы"
 d_cryo_volcano_desc: "В этом регионе находятся криовулканы, периодически извергающие воду, лёд и различные углеводороды."
 d_alkaline_kelp: "Щелочная Ламинария"
 d_alkaline_kelp_desc: "В этом затопленном районе, богатом экзотическими металлами, растворенными в воде, процветает лес ламинарии."
 d_megafloral_jungle: "£blocker£ Мегафлоральные Джунгли"
 d_megafloral_jungle_desc: "Этот регион покрыт плотной посадкой непроходимых джунглей с непропорционально громадной и густой растительностью."
 d_alkaline_vent: "Щелочная Шахта"
 d_alkaline_vent_desc: "Эти фумаролы выбрасывают пар, содержащий различные ядовитые газы с высокой концентрацией металлов пребывающих в газообразном состоянии, прямо из глубин земной коры."
 d_hydrocarbon_lake: "Углеводородное Озеро"
 d_hydrocarbon_lake_desc: "Глубокое озеро, заполненное жидкими углеводородами."
 d_mossfield: "Мшистые Поля"
 d_mossfield_desc: "Обширные поля, покрытые колониями мха."
 d_bioluminescent_shore: "Биолюминесцентные Берега"
 d_bioluminescent_shore_desc: "Этот прибрежный регион, богат биолюминесцентными водорослями, которые светятся при воздействии разбивающихся волн или водных брызг."
 d_twilight_shore: "Сумеречные Берега"
 d_twilight_shore_desc: "В этом регионе планеты, расположенном прямо посередине между жидкой и замерзшей частями океана, на прибрежных скалах, покрытых лишайниками и мхами, произростают черезвычайно выносливые травы."
 d_radiotrophic_fungi: "Радиотрофные Грибы"
 d_radiotrophic_fungi_desc: "Вид грибов, способных использовать радиацию в качестве источника энергии для стимулирования роста собственных колоний."
 d_alkaline_cave: "Щелочные Поводные Пещеры"
 d_alkaline_cave_desc: "Сеть подводных пещер с высокой концентрацией металлов, растворённых прямо в местной воде."
 d_hydrocarbon_gorge: "Углеводородные Ущелья"
 d_hydrocarbon_gorge_desc: "Реки жидких углеводородов прорезают углеродистые породы."
 d_ammonia_lake: "Аммиачные Озёра"
 d_ammonia_lake_desc: "Озера с высоким содержанием аммиака повышают плодородие окружающих земель."
 d_lichen_forest: "Лишайниковые Леса"
 d_lichen_forest_desc: "Выносливые травы, растущие на полях, покрытых густым слоем лишайников."
 d_lush_cave: "Пещерные Оазисы"
 d_lush_cave_desc: "Пещеры, отличающиеся высокой влажностью благодаря близости к подземным источникам воды, способствуют росту густой растительности, защищённой от суровых условий поверхности."
 d_bioluminescent_forest: "Биолюминесцентные Леса"
 d_bioluminescent_forest_desc: "Густые леса, кишащие существами излучающими свет."
 d_sea_grass: "Водные Луга"
 d_sea_grass_desc: "Луга, образованные морскими травами — растениями, произрастающими в мелководных прибрежных водах."
 d_sulfur_rich_lands: "Серные Пашни"
 d_sulfur_rich_lands_desc: "Многочисленные плодородные поля, орошаемые реками серной кислоты."
 d_carbon_rich_hills: "Углеродные Холмы"
 d_carbon_rich_hills_desc: "Бесплодные холмы, богатые углеродными соединениями."
 d_mineral_rich_crater: "Кратер Изобилия"
 d_mineral_rich_crater_desc: "Громадный ударный кратер, образовавшийся в результате падения на поверхность астероида с высоким содержанием металлов."
 d_lithium_plains: "Литиевые Равнины"
 d_lithium_plains_desc: "Соляные равнины с высокой концентрацией лития."
 d_geothermal_sinkhole: "Геотермальные Воронки"
 d_geothermal_sinkhole_desc: "Глубокие воронки, из которой вырываются горячие потоки геотермальных источников."
 d_lava_lake: "Лавовое Озеро"
 d_lava_lake_desc: "Большой объём расплавленных базальтовых пород, скопившийся в жерле древнего вулкана."
 d_geothermal_lake: "Геотермальные Озёра"
 d_geothermal_lake_desc: "Лагуны, нагреваемые за счёт геотермальной активности."
 d_bioluminescent_cliffs: "Биолюминесцентные Скалы"
 d_bioluminescent_cliffs_desc: "Скалы, на которых виднеются как ценные полезные ископаемые, так и скопления биолюминесцентных грибов."
 d_bioluminescent_cave: "Биолюминесцентные Гроты"
 d_bioluminescent_cave_desc: "Большие пещеры, в которых в непосредственной близости от геотермальных источников растёт биолюминесцентные виды мха."
 d_bioluminescent_preserve: "£blocker£ Биолюминесцентный заповедник"
 d_bioluminescent_preserve_desc: "Этот густой лесной заповедник изобилует биолюминесцентной флорой и фауной."
 d_retinal_forest: "Ретинальные Леса"
 d_retinal_forest_desc: "Эти леса, которые отличаются густым пологом и практически непроходимой плотностью посадки, имеют под собой довольно бедную почву, но при этом богаты плодовыми деревьями. Обладают характерным и выразительным красновато-лиловым окрасом флоры."
 d_retinal_great_river: "Ретинальная Река"
 d_retinal_great_river_desc: "Медленно текущая река коллосальных объёмов обеспечивает условия для процветания жизни при помощи глубокой пропитки водой и обеспечения илистыми, ретиналь-содержащими, удобрениями прибрежных регионов. Обладает характерным и выразительным красновато-лиловым окрасом воды."
 d_retinal_plains: "Ретинальные Поля"
 d_retinal_plains_desc: "Эти обширные равнины изобилуют плодородными видами почвы и высокими, ретиналь-содержащими, травами, что гарантирует большой потенциал для сельскохозяйственной деятельности. Обладают характерным и выразительным красновато-лиловым окрасом травы."
 d_retinal_dense_jungle: "£blocker£ Непроходимые Джунгли"
 d_retinal_dense_jungle_desc: "Весь этот регион полностью порос густыми, непроходимыми джунглями." 
 d_deep_ocean: "£blocker£ Глубокие Океаны"
 d_deep_ocean_desc: "В этом регионе океан слишком глубок: свет не проникает на подобные глубины, а давление слишком велико для того чтобы там могли выжить какие-либо виды, кроме тех, которые давно приспособились к подобным условиям."
 d_karst_skylight: "Карстовый Лабиринт"
 d_karst_skylight_desc: "Обширная сеть карстовых пещер, освещаемая естественными световыми шахтами и покрытая редкой растительностью, питаемой подземными реками."
 d_tar_sea: "Битумное Море"
 d_tar_sea_desc: "Большой объём жидкой смолы, содержащей множество других углеводородных соединений."
 d_ammonia_bog: "Аммиачные Топи"
 d_ammonia_bog_desc: "Эти низменные, богатые аммиаком, водно-болотные угодья являются богатым источником питательных веществ для различного рода растений."
 d_ammonia_toxic_kelp: "£blocker£ Амиачные Ламинарии"
 d_ammonia_toxic_kelp_desc: "Океаны этого региона черезвычайно насыщены аммиаком и покрыты густым лесом уникального вида ламинарий, токсичной для большинства известных форм жизни." 
 d_twilight_glacier: "£blocker£ Сумеречный Ледник"
 d_twilight_glacier_desc: "Этот регион покрыт огромным массивом невероятного по своей плотности льда."
 d_fungal_fields: "Грибные Поля"
 d_fungal_fields_desc: "Обширные и невероятно жизнеспособные грибковые колонии."
 d_volcanic_lake: "Вулканическое Озеро"
 d_volcanic_lake_desc: "Озеро с теплой водой, нагреваемой активным геотермальным источником."
 d_frost_fungus: "Хладостойкие Грибы"
 d_frost_fungus_desc: "Хладостойкие грибные колонии прекрасно себя чувствуют в условиях местной тундры."
 d_algae_river: "Речные Водоросли"
 d_algae_river_desc: "Широкая, медленно текущая река, в которой произрастают скопления коралловых водорослей."
 d_retinal_shores: "Ретинальные Берега"
 d_retinal_shores_desc: "Вблизи водоемов, подогреваемых геотермальными источниками, процветают уникальные виды ретинальной растительности."
 d_atw_toxic_atmosphere: "Токсичные Атмосферные Слои"
 d_atw_toxic_atmosphere_desc: "В некоторых слоях атмосферы планеты наблюдается повышенная концентрация токсичных газов, которую необходимо стабилизировать при помощи соответствующих технологий, чтобы впоследствии оптимизировать общие атмосферные условия на всей планете."
 
