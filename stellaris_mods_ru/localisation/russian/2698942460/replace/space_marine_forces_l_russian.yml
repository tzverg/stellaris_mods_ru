    building_space_marine_chapter_fortress: "Твердыня Ордена"
    building_space_marine_chapter_fortress_desc: "Твердыня - это одновременно и крепость и монастырь, она является духовной и материальной обителью ордена Космодесанта. Некоторые ордена используют колонию, на которой возведена твердыня, в качестве единственного источника своих рекрутов, в то же время другие ордена набирают неофитов на множестве различных миров.\n\nКолония, как правило, целиком находится под властью ордена и служит его главной оперативной базой."
    building_space_marine_chapter_fortress_effect_desc: "§YПредоставляет возможность вербовки уникальных армейских подразделений. Здесь проходят обучение $space_marine_company_plural$ и $space_marine_garrison_plural$.§!\n\n"

    building_titan_foundry: "Литейная Титанов"
    building_titan_foundry_desc: "Религиозно-промышленный комплекс, полностью посвящённый производству разнообразных боевых машин и других механизированных устройств для ведения войн прямого контакта. Основным назначением комплекса является создание гигантских боевых шагоходов, призванных господствовать на полях сражений.\n\nМестные послушники, инженеры и учёные разрабатывают, сохраняют и приумножают научные и технические знания, совершенствуя материалы и конструкции этих колоссальных боевых машин." building_titan_foundry_effect_desc: "§YПредоставляет возможность сборки уникальных механизированных подразделений. Здесь собирают, обучают и переводят в состав регулярных частей $titan_legion_army_plural$.§!\n\n"

    building_death_watch_fortress: "Твердыня Караула Смерти"
    building_death_watch_fortress_desc: "Твердыня Караула Смерти служит обителью для прославленных ветеранов, составляющих ряды этого почётного элитного братства. Отдалённая от обителей других орденов Космодесанта, она представляет собой величественное и тщательно охраняемое сооружение, окутанное завесой тайны.\n\nВход внутрь дозволен лишь действующим членам Караула Смерти, если только иное не будет разрешено действующим князем твердыни, либо в случае если незваного гостя не доставят сюда для проведения тщательного допроса."
    building_death_watch_fortress_effect_desc: "§YПредоставляет возможность вербовки уникальных армейских подразделений. Здесь отдыхают отошедшие от дел $death_watch_company_plural$.§!\n\n"

    ####################################

    space_marine_company: "Рота Космодесанта"
    space_marine_company_plural: "Роты Космодесанта"
    space_marine_company_desc: "Рота Космодесанта — одно из основных организационных подразделений ордена. Как правило, она насчитывает около ста генетически усовершенствованных бойцов под командованием офицера в звании капитана. Это крупнейшее постоянное формирование в составе ордена. Всего одна рота представляет собой грозную силу, способную самостоятельно вступить в бой и, при должной сноровке, сокрушить противника без какой-либо внешней поддержки.\n\nВ распоряжении роты находится широкий арсенал вооружения и бронетехники, машин поддержки и авиации, позволяющий ей действовать полностью автономно."

    space_marine_garrison: "Гарнизон Космодесанта"
    space_marine_garrison_plural: "Гарнизоны Космодесанта"
    space_marine_garrison_desc: "Гарнизон Космодесанта дал обет защиты родных миров. Эти генетически усовершенствованные бойцы располагают бронетехникой, машинами поддержки и авиацией, находящимися под управлением гарнизонного командования."

    titan_legion_army: "Легион Титанов"
    titan_legion_army_plural: "Легионы Титанов"
    titan_legion_army_desc: "Легион Титанов — это боевое механизированное подразделение, состоящее из боевых титанов и групп поддержки. В его состав входят несколько классов гигантских пилотируемых боевых шагоходов, гармонично дополняющих друг друга и сеющих опустошение на поле боя."

    space_marine_brotherhood: "Братство Космодесанта"
    space_marine_brotherhoody_plural: "Братства Космодесанта"
    space_marine_brotherhood_desc: "Организованные по принципу рот Космодесанта, подобные братства набирают рекрутов по всей галактике, в том числе из состава рядовых рот Космодесанта. Однако, в отличие от них, каждый член братства обладает выдающимися псионическими способностями.\n\nДля того чтобы вести отряды Братства в бой и сохранять их псионическое единство, требуется исключительная ментальная сила, поэтому подобной чести удостаиваются лишь наиболее искусные боевые братья. Помимо командования братьями, такой лидер направляет и усиливает псионические способности подчинённых, служа проводником их объединённой мощи."

    death_watch_company: "Караул Смерти"
    death_watch_company_plural: "Караулы Смерти"
    death_watch_company_desc: "Космодесантники, состояшие в Карауле Смерти, не формируют отдельные сепаратные роты. Это ветераны Космодесанта, собранные из состава множества других существующих орденов, которые несут совместную службу в течение долгого срока.\n\nКосмодесантники Караула Смерти, как правило, не сражаются в составе обычных тактических подразделений принятых в других орденах, таких как отделения или роты. Вместо этого они действуют небольшими группами специалистов особого назначения."

    death_watch_company_limit_tooltip: "\n§YЛишь закалённые в бесчисленных сражениях ветераны космодесанта, обладающие исключительными сноровкой и мастерством, удостаиваются чести вступить в ряды столь элитного формирования. По этой причине одновременно может быть развёрнуто лишь ограниченное число подобных подразделений.§!"